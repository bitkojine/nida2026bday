name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - feature/**
      - codex/**
  workflow_dispatch:

env:
  VITE_REAL_COMPILER_API_URL: https://nida2026bday-real-compiler.onrender.com

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve deploy target
        id: target
        shell: bash
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          if [[ "$BRANCH_NAME" == "main" ]]; then
            echo "destination=." >> "$GITHUB_OUTPUT"
            echo "base_path=/nida2026bday/" >> "$GITHUB_OUTPUT"
            echo "public_url=https://${GITHUB_REPOSITORY_OWNER}.github.io/nida2026bday/" >> "$GITHUB_OUTPUT"
          else
            BRANCH_SLUG="$(echo "$BRANCH_NAME" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's#[^a-z0-9/_-]+#-#g; s#/+#/#g; s#^/+##; s#/+$##')"
            echo "destination=$BRANCH_SLUG" >> "$GITHUB_OUTPUT"
            echo "base_path=/nida2026bday/$BRANCH_SLUG/" >> "$GITHUB_OUTPUT"
            echo "public_url=https://${GITHUB_REPOSITORY_OWNER}.github.io/nida2026bday/$BRANCH_SLUG/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          VITE_APP_BASE_PATH: ${{ steps.target.outputs.base_path }}
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.target.outputs.destination }}
          keep_files: true

      - name: Publish deployment URL
        run: |
          echo "Deployed: ${{ steps.target.outputs.public_url }}" >> "$GITHUB_STEP_SUMMARY"
