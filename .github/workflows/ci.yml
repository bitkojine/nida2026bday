name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  VITE_REAL_COMPILER_API_URL: https://nida2026bday-real-compiler.onrender.com

permissions:
  actions: read
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schedule-guard:
    name: Nightly Change Guard
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}
    steps:
      - name: Detect if nightly should run
        id: guard
        uses: actions/github-script@v7
        with:
          script: |
            const isSchedule = context.eventName === 'schedule';
            if (!isSchedule) {
              core.setOutput('should_run', 'true');
              return;
            }

            const { owner, repo } = context.repo;
            const currentSha = context.sha;
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: 'ci.yml',
              event: 'schedule',
              status: 'completed',
              per_page: 25,
            });
            const previousSuccess = runs.find(
              (run) => run.id !== context.runId && run.conclusion === 'success',
            );
            if (!previousSuccess) {
              core.setOutput('should_run', 'true');
              return;
            }

            core.setOutput(
              'should_run',
              previousSuccess.head_sha === currentSha ? 'false' : 'true',
            );

  quick-feedback:
    name: Quick Feedback (<30s target)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Install Playwright browser (WebKit)
        run: npx playwright install --with-deps webkit

      - name: 30s quality bundle
        run: npm run check:30s

      - name: Real compiler backend integration
        run: npm run check:real-compiler-backend

  nightly-quality:
    name: Nightly Quality (unit + build)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'schedule' && needs.schedule-guard.outputs.should_run == 'true'
    needs: schedule-guard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Unit tests (with coverage)
        run: npm run test

      - name: Build
        run: npm run build

      - name: Real compiler backend integration
        run: npm run check:real-compiler-backend

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-nightly
          path: coverage
          if-no-files-found: ignore
          retention-days: 7
